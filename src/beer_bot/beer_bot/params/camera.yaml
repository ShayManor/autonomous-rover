camera_node:
  ros__parameters:
    source: "synthetic"        # webcam | video | synthetic
    device_index: 0
    video_path: ""
    width: 640
    height: 480
    fps: 30.0
    fov_deg: 70.0
    frame_id: "camera_optical_frame"
    calibration_file: ""       # path to chessboard output; empty -> FOV default
    rgb_topic: "/camera/image_raw"
    camera_info_topic: "/camera/camera_info"
